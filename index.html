<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L2 Games FMP</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #2a1a5e, #1e3c72);
    color: #ffffff;
}

header {
    background: rgba(0, 0, 0, 0.6);
    padding: 20px 0;
    text-align: center;
}

nav {
    background: rgba(0, 0, 0, 0.5);
    padding: 12px;
    text-align: center;
}

nav a {
    color: #cbb3ff;
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
}

nav a:hover {
    color: #ffffff;
}

section {
    padding: 20px;
    margin: 20px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 12px;
}

footer {
    text-align: center;
    padding: 10px;
    background: rgba(0, 0, 0, 0.7);
    position: fixed;
    bottom: 0;
    width: 100%;
}

/* TERMINAL */
.container {
    width: 230px;
    height: 194px;
}

.terminal_toolbar {
    display: flex;
    height: 30px;
    align-items: center;
    padding: 0 8px;
    border-radius: 5px 5px 0 0;
    background: linear-gradient(#504b45, #3c3b37);
}

.butt {
    display: flex;
}

.btn {
    height: 12px;
    width: 12px;
    margin-right: 5px;
    border-radius: 50%;
    border: none;
    background: #777;
}

.btn-color {
    background: #ee411a;
}

.user {
    color: #d5d0ce;
    margin-left: 8px;
    font-size: 14px;
}

.terminal_body {
    background: rgba(56, 4, 40, 0.9);
    height: calc(100% - 30px);
    border-radius: 0 0 5px 5px;
    position: relative;
    overflow: hidden;
}

/* VIDEO */
.terminal_video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* LOADING TEXT */
.terminal_overlay {
    position: absolute;
    bottom: 10px;
    left: 10px;
    color: #7eda28;
    font-family: monospace;
    font-size: 12px;
}
</style>
</head>

<body>

<header>
    <h1>L2 Games FMP Website</h1>
</header>

<nav>
    <a href="#research">Research</a>
</nav>

<section id="research">
    <h2>Research</h2>

    <div class="container">
        <div class="terminal_toolbar">
            <div class="butt">
                <button class="btn btn-color"></button>
                <button class="btn"></button>
                <button class="btn"></button>
            </div>
            <p class="user">johndoe@admin: ~</p>
        </div>

        <div class="terminal_body">
            <video id="player" class="terminal_video" controls>
                <source src="your-video.mp4" type="video/mp4">
            </video>

            <div id="loadingText" class="terminal_overlay">
                johndoe@admin:~$ loading video...
            </div>
        </div>
    </div>

</section>

<footer>
    <p>&copy; 2026 L2 Games FMP</p>
</footer>

<script>
const video = document.getElementById("player");
const loadingText = document.getElementById("loadingText");

video.addEventListener("canplay", () => {
    loadingText.innerText = "johndoe@admin:~$ ready ✔";

    setTimeout(() => {
        loadingText.style.display = "none";
    }, 2000);
});
</script>

</body>
</html>
